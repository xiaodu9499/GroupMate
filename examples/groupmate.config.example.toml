[workspace]
data_dir = "data"

[source]
type = "dingtalk-cli"
command = "dws.cmd"
group_id = ""
bot_name = ""
fetch_limit = 200
history_limit = 80
lookback_minutes = 1440

[executor]
type = "codex-cli"
command = "codex.cmd"
default_sandbox = "read-only"

[permissions]
owners = []
writers = []
default_mode = "ask"

[execution]
ask_sandbox = "read-only"
write_sandbox = "workspace-write"
dangerous_actions_require_confirmation = true
